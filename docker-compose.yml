version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mcp-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build: ./frontend
    container_name: mcp-frontend
    ports:
      - "3001:3000"
    environment:
      - VITE_MCP_URL=http://localhost:8001
      - VITE_CHAT_URL=http://localhost:8001/chat
    networks:
      - mcp-network
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  mcp-network:
    driver: bridge
